apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blog
  template:
    metadata:
      labels:
        app: blog
    spec:
      imagePullSecrets:
        - name: ghcr-auth
      containers:
        - name: blog
          image: ghcr.io/whutchinson98/blog:20260403134433 # {"$imagepolicy": "apps:blog"}
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
