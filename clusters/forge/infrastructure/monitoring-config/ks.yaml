apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: monitoring-config
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: monitoring
    - name: routing-traefik
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/monitoring-config
  prune: true
  wait: true
